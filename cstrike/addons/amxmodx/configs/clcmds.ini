"Кикнуть игрока"         "amx_kick #%userid%"          "b"     "u"    ; Полный выброс игрока с сервера
"Сделать Зомби"          "zp_zombie #%userid%"         "bd"    "u"    ; Принудительно заразить выбранного человека
