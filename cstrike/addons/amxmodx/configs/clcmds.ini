"Возродить игрока"       "zp_respawn #%userid%"        "bd"    "u"    ; Моментально заспавнить игрока посреди раунда
"Дать 10 аммо-паков"     "zp_ammo_give #%userid% 10"   "bd"    "u"    ; Выдать мелкий бонус игроку на покупку оружия