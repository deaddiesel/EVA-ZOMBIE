; ===================================================================
;       AMX Mod X Плагины (Чистое ядро под Русский ZP 5.0 + MySQL)
; ===================================================================

; --- АДМИНСКАЯ БАЗА (СТРОГО MYSQL) ---
;admin.amxx				; Локальные админы из users.ini больше не нужны
admin_sql.amxx			; Админы и VIP загружаются из базы данных твоего сайта
admincmd.amxx			; Основные команды админа в консоли (kick, ban, slap)
adminhelp.amxx			; Помощь по админским командам
adminslots.amxx			; Резервные слоты для админов/VIP

; --- МЕНЮ УПРАВЛЕНИЯ ---
; menufront.amxx		; Главное админ-меню (вызывается на amxmodmenu)
cmdmenu.amxx			; Меню команд сервера (настройки, звуки)
plmenu.amxx				; Меню управления игроками (кик, бан, смена команд)
mapsmenu.amxx			; Меню карт (ручная смена, запуск голосования)
pluginmenu.amxx			; Меню настроек кваров (cvar) внутри игры

; --- ЧАТ И УВЕДОМЛЕНИЯ ---
adminchat.amxx			; Команды админ-чата (amx_say, amx_chat, @@-сообщения)
antiflood.amxx			; Защита чата от флуда и спама командами
adminvote.amxx			; Админские голосования (да/нет)

; --- ИНФОРМАЦИЯ О КАРТЕ ---
timeleft.amxx			; Команда /timeleft в чате для проверки времени карты

; --- КОНФИГУРАЦИЯ ---
pausecfg.amxx			; Позволяет временно отключать плагины для тестов


; ===================================================================
;             ОТКЛЮЧЕННЫЙ МУСОР И КОНФЛИКТУЮЩИЕ ПЛАГИНЫ
; ===================================================================
;multilingual.amxx		Вырезано: Исконно русский сервер, языки не нужны
;scrollmsg.amxx			Вырезано: Бегущая строка (накладывается на худ ZP)
;imessage.amxx			Вырезано: Инфо-сообщения (засоряют экран)
;mapchooser.amxx		Вырезано: Стандартное голосование (конфликтует с ZP)
;nextmap.amxx			Вырезано: Будет заменено кастомным менеджером карт
;statscfg.amxx			Вырезано: Настройка старой статистики
;statsx.amxx			Вырезано: Обычный Топ-15 сломается из-за HP зомби