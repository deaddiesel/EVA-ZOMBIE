echo [Ядро] Загрузка конфигурационного файла AMX Mod X...

amx_default_access      "z"            ; Флаг доступа по умолчанию для обычных игроков
amx_password_field      "_pw"          ; Префикс setinfo в консоли игрока для ввода пароля админки
amx_mode                1              ; Режим работы админок (1 — обычный, проверка по списку)
amx_show_activity       2              ; Отображение действий админа (2 — показывать ник админа всем в чате)

; --- ВЫКЛЮЧЕННЫЙ СПАМ НА ЭКРАНЕ (ОПТИМИЗАЦИЯ ПОД ZP 5.0) ---
amx_scrollmsg           "" 0           ; Бегущая строка (занулена, чтобы не засорять HUD мода)
amx_imessage            ""             ; Статические инфо-сообщения по центру (вырезаны)
amx_freq_imessage       0              ; Частота показа инфо-сообщений (отключена)

; --- НАСТРОЙКИ МЕНЮ УПРАВЛЕНИЯ ---
amx_plmenu_bantimes     0              ; Сроки банов в меню (оставлен 0 — навсегда, под MySQL бан-системы)
amx_tempban_maxtime     4320           ; Максимальное время временного бана для админов (в минутах)
amx_plmenu_slapdmg      0              ; Сила пинка в меню slapmenu (0 — просто подбросить без урона)
amx_flood_time          0.75           ; Защита от флуда в чате (минимальная задержка между сообщениями)
amx_reservation         1              ; Количество резервных слотов для админов и VIP
amx_hideslots           0              ; Скрывать резервные слоты в общем мониторинге (0 — нет)

; --- ОПОВЕЩЕНИЯ О ВРЕМЕНИ КАРТЫ ---
amx_time_display        "a 60"         ; Показ времени до конца карты (белый текст внизу экрана за 1 минуту)
amx_time_voice          0              ; Звуковые оповещения диктора Half-Life (0 — полностью отключены для ZP)

; --- СИСТЕМА ГОЛОСОВАНИЙ ---
amx_vote_delay          30             ; Минимальная задержка в секундах между двумя голосованиями
amx_vote_time           10             ; Длительность проведения голосования в секундах
amx_vote_answers        1              ; Показывать в чат, кто и за какой пункт проголосовал (1 — да)
amx_votekick_ratio      0.60           ; Процент голосов «За» для успешного кика игрока (0.60 = 60%)
amx_voteban_ratio       0.70           ; Процент голосов «За» для успешного бана игрока (0.70 = 70%)
amx_votemap_ratio       0.50           ; Процент голосов «За» для успешной смены карты (0.50 = 50%)
amx_vote_ratio          0.50           ; Процент голосов «За» для победы в свободном голосовании (50%)

; --- НАСТРОЙКИ КАРТЫ ---
amx_extendmap_max       45             ; Максимальное время в минутах, на которое игроки могут продлить карту
amx_extendmap_step      15             ; Шаг одного продления карты в минутах

; --- НАСТРОЙКИ СТРОГО РУССКОГО ЯЗЫКА (БЕЗ МУЛЬТИЯЗЫЧНОСТИ) ---
amx_language            "ru"           ; Основной язык сервера (строго русский)
amx_client_languages    1              ; Запретить игрокам менять язык (все используют русский язык сервера)
amx_language_display_msg 1             ; Отключить уведомление о смене языка при входе (минус спам в чат)

; --- УВЕДОМЛЕНИЯ О ПОМОЩИ (amx_help) ---
amx_help_display_msg    0              ; Отключить спам-сообщение о команде amx_help при входе игрока
amx_help_display_msg_time 0            ; Задержка перед показом сообщения помощи (отключена)
amx_help_amount_per_page 10            ; Количество команд, отображаемых на одной странице amx_help

; --- ОТЛАДКА И ПЕФОРМАНС ЯДРА ---
amx_debug               1              ; Режим отладки (1 — включать debug только для плагинов с пометкой в plugins.ini)
amx_mldebug             ""             ; Отладка перевода языков (полностью отключена)
amx_perflog_ms          0.0            ; Мониторинг лагов функций (0.0 — отключен, чтобы не забивать процессор)

; --- ПОЛНОЕ ОТКЛЮЧЕНИЕ СТАРЫХ СТАТИСТИК И ЛИМИТОВ VALVE ---
csstats_rank            0              ; Ранк-система обычной CS (полностью отключена)
csstats_maxsize         0              ; Максимальный размер файла старой статистики (занулен)
csstats_rankbots        0              ; Запретить учет ботов в старой статистике
amx_statsx_duration     0.0            ; Длительность показа HUD окон старой статистики (отключено)
amx_statsx_freeze       0.0            ; HUD статистика во время заморозки раунда (отключено)
amx_restrmapsettings    0              ; Ограничение оружия по картам через старый плагин (отключено)

; --- ПОДКЛЮЧЕНИЕ СОВРЕМЕННОГО МОДИФИКАЦИОННОГО ЯДРА REZPLAGUE ---
amx_pluginsconfig "plugins-rezp.ini"