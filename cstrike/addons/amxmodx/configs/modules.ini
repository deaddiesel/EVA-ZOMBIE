reapi        ; Основа для работы с ReHLDS и ReGameDLL (замена cstrike)
json         ; Чтение настроек классов и оружия ZP 5.0
mysql        ; Связь с базой данных вашего сайта
sqlite       ; Локальная база данных (резерв для ZP 5.0)

hamsandwich  ; Перехват урона, смертей и спавнов игроков
fakemeta     ; Кастомный свет, эффекты и модели зомби
fun          ; Выдача здоровья, скорости и гранат
engine       ; Управление объектами на карте (мины, пушки)

