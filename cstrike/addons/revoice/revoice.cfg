# ========================================================
# 		CONFIG FOR REVOICE (ОБНОВЛЕННАЯ ВЕРСИЯ С OPUS)
# ========================================================

# REV_LogLevel (Управление логированием)
# 0 - выключено (рекомендуется для готовой сборки, чтобы не нагружать диск)
# 1 - только критические ошибки
# 2 - полные технические логи (нужно только для поиска багов)
REV_LogLevel 0

# REV_HltvCodec (Кодек для HLTV)
# Задает аудиокодек для записи голоса на серверах трансляций и демо-записей.
# варианты: speex (старый стандарт), opus (современный, чистый звук)
REV_HltvCodec opus

# REV_DefaultCodec (Базовый кодек для пираток)
# Задает кодек для игроков со старыми non-Steam клиентами.
# Оставляем "speex" для максимальной совместимости, чтобы слышали абсолютно все.
REV_DefaultCodec speex

# REV_SpeexQuality (Качество звука Speex)
# Применяется, если используется кодек speex. Принимает значения от 1 до 10.
# 1 - худшее качество (сильное сжатие), 10 - максимальное качество.
# Оптимально поставить 8 или 9: звук чистый, а нагрузка на сеть минимальная.
REV_SpeexQuality 8

# REV_HearDead (Голос после смерти / в наблюдении)
# 0 - мертвые игроки не слышат живых (и наоборот). Аудиоразделение раунда.
# 1 - все слышат всех (живые слышат мертвых и спектаторов).
# Для зомби-мода лучше поставить 1, чтобы зараженные игроки могли общаться с выжившими.
# ВАЖНО: Если у тебя в AMX Mod X будет стоять отдельный плагин управления голосом 
# (например, Voice Comm), то эту настройку нужно выставить в 0, чтобы плагины не конфликтовали.
REV_HearDead 1