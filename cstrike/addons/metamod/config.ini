# ========================================================
#          КОНФИГУРАЦИЯ METAMOD (ДЛЯ ЗОМБИ СБОРКИ)
# ========================================================
#
# Главное правило при редактировании этого файла:
# НЕ МЕНЯЙТЕ НИЧЕГО, ЕСЛИ НЕ ПОНИМАЕТЕ, ЗА ЧТО ЭТО ОТВЕЧАЕТ!
#
# Формат записи: <имя_опции> <значение>
# Комментарии начинаются с "//" или "#" и должны быть строго в начале строки.


# --------------------------------------------------------
# debuglevel (Уровень отладки)
# --------------------------------------------------------
# Принимает целые числа от 0 и выше.
# Задает объем технических логов Метамода в консоли сервера.
# По умолчанию: 0. Если запустить сервер с параметром "-dev", будет 3.
# Для готовой зомби-сборки оставляем 0, чтобы консоль не забивалась спамом.
debuglevel 0


# --------------------------------------------------------
# gamedll (Путь к основной библиотеке игры)
# --------------------------------------------------------
# Позволяет вручную указать путь к главному файлу мода (mp.dll или cs.so).
# Полезно, если вы используете старых ботов (например, PodBot).
#
# ВАЖНО ДЛЯ ГИБРИДА: Строка ДОЛЖНА быть закомментирована! 
# Если её отключить, Метамод сам автоматически определит ОС и загрузит:
# - dlls/mp.dll на Windows
# - dlls/cs.so на Linux
# Если прописать путь жестко, сервер упадет на одной из систем.
#
# Примеры использования (если бы строка была активна):
# gamedll dlls/hl.dll
# gamedll ../podbot/podbot.dll


# --------------------------------------------------------
# exec_cfg (Исполняемый файл конфигурации)
# --------------------------------------------------------
# Указывает путь к файлу с командами, которые выполнятся сразу после
# загрузки самого Метамода. Путь должен быть относительно папки cstrike.
# По умолчанию: "addons/metamod/exec.cfg".
# Оставляем закомментированным, так как для зомби-мода он обычно не нужен.
#
# Пример: exec_cfg configs/debugging.cfg


# --------------------------------------------------------
# clientmeta (Доступность команд для обычных игроков)
# --------------------------------------------------------
# Включает или выключает доступ игроков к командам "meta list" и "meta version"
# прямо из консоли их игрового клиента CS 1.6.
# Значение "no" скрывает список установленных плагинов от обычных игроков.
# Это базовая защита, чтобы никто не смог просканировать твою сборку на уязвимости.
clientmeta no


# --------------------------------------------------------
# dynalign_list (Динамическое выравнивание списка)
# --------------------------------------------------------
# Включает красивое выравнивание колонок при выводе списка плагинов.
# Если написать в консоли сервера "meta list", таблица с плагинами
# будет ровной и легко читаемой. На саму игру никак не влияет.
dynalign_list yes