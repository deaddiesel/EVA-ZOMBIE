//
// @package: YaPB
// @version: 4.5
// @author: YaPB Project
// @filename: yapb.cfg
// 
// Main configuration file for YaPB. Can be executed using the 'exec' command.
//

//
// Автоматический старт анализатора карты (генератора путей), если файлы вейпоинтов отсутствуют.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_graph_analyze_auto_start "1"

//
// Автоматическое сохранение результатов анализа в файл графа путей и перезапуск ботов.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_graph_analyze_auto_save "1"

//
// Минимальное расстояние в юнитах для удержания точек (нод) путей друг от друга.
// ---
// По умолчанию: "64", Минимум: "42", Максимум: "128"
// 
yb_graph_analyze_distance "64"

//
// Максимальная высота прыжка для проверки доступности следующей точки пути.
// ---
// По умолчанию: "44", Минимум: "44", Максимум: "64"
// 
yb_graph_analyze_max_jump_height "44"

//
// Значение FPS, на котором работает процесс фонового анализатора. Это предотвращает зависание игры.
// ---
// По умолчанию: "30.0", Минимум: "25.0", Максимум: "99.0"
// 
yb_graph_analyze_fps "30.0"

//
// Определяет, должен ли анализатор очищать ненужные/дублирующиеся пути после завершения.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_graph_analyze_clean_paths_on_finish "1"

//
// Определяет, должен ли анализатор автоматически объединять близко расположенные точки с большим количеством связей.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_graph_analyze_optimize_nodes_on_finish "1"

//
// Определяет, должен ли анализатор автоматически размечать ключевые зоны карты как цели после финиша.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_graph_analyze_mark_goals_on_finish "1"

//
// Включает или выключает служебные отладочные сообщения о состоянии ботов. Не требуется обычным пользователям.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "4"
// 
yb_debug "0"

//
// Насильно заставляет всех живых ботов построить путь и бежать к конкретному ID вейпоинта, указанному здесь.
// ---
// По умолчанию: "-1", Минимум: "-1", Максимум: "4096"
// 
yb_debug_goal "-1"

//
// Процент ботов, которые могут побежать за лидером (игроком) в начале каждого раунда.
// ---
// По умолчанию: "20", Минимум: "0", Максимум: "100"
// 
yb_user_follow_percent "10"

//
// Какое максимальное количество ботов может одновременно бегать за одним игроком.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "8"
// 
yb_user_max_followers "1"

//
// Режим Jason Mode (Только ножи). Если включено, все боты будут использовать только ножи, полностью пропуская закупку.
// НА ЗОМБИ СТАВИМ "0", иначе выжившие люди не смогут стрелять из пушек!
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_jasonmode "0"

//
// Разрешает ботам использовать радио или chatter-болтовню.
//  Допустимые значения: '0', '1', '2'.
//  Если '0', радио и болтовня полностью отключены.
//  Если '1', разрешены только стандартные радиокоманды.
//  Если '2', разрешены и радиокоманды, и чаттер-звуки.
// ДЛЯ ЗОМБИ СТАВИМ "0", чтобы не ломать логику раундов и плагины меню мода!
// ---
// По умолчанию: "2", Минимум: "0", Максимум: "2"
// 
yb_radio_mode "0"

//
// Определяет, могут ли боты использовать командную экономику (например, не покупать оружие всем раундом ради сохранения денег на более мощные пушки).
// НА ЗОМБИ СТАВИМ "0", лимиты денег тут не нужны.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_economics_rounds "0"

//
// Разрешает ботам плевать на экономику команды и покупать оружие без оглядки на финансы остальных.
// ---
// По умолчанию: "25", Минимум: "0", Максимум: "100"
// 
yb_economics_disrespect_percent "0"

//
// Разрешает или запрещает боту проверять окружающую среду на темноту, тем самым позволяя или запрещая использовать фонарики или ПНВ (ночное зрение).
// НА ЗОМБИ СТРОГО ОБЯЗАТЕЛЬНО ДЕЛАЕМ "1", чтобы зомби и выжившие врубали зрение в темноте.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_check_darkness "1"

//
// Разрешает ботам частично уклоняться от летящих гранат (отбегать/отпрыгивать в стороны).
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_avoid_grenades "1"

//
// Разрешает или запрещает ботам мстить за тимкилл или атаки со стороны союзников по команде.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_tkpunish "0"

//
// Если включено, мыслительная функция ботов отключается, поэтому они вообще не сдвинутся со своих мест спавна.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_freeze_bots "0"

//
// Разрешает или запрещает ботам рисовать свои логотипы (спреи/граффити) на стенах.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_spraypaints "1"

//
// Разрешает или запрещает ботам использовать встроенные алгоритмы закупки оружия.
// ДЛЯ ЗОМБИ СТРОГО СТАВИМ "0", так как в RePlagueZ пушки выдаются модом, 
// и это освободит процессор бота от пустых попыток открыть меню магазина [39.2].
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_botbuy "0"

//
// Разрешает ботам ломать разрушаемые объекты вокруг себя (ящики, вентиляции, двери), даже не прикасаясь к ним.
// ДЛЯ ЗОМБИ СТРОГО СТАВИМ "1", чтобы зомби-боты могли пробивать баррикады и проходы в нычки людей [39.3]!
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_destroy_breakables_around "1"

//
// Радиус в юнитах, в пределах которого бот сканирует мир на наличие новых объектов, предметов и брошенного оружия.
// ---
// По умолчанию: "450.0", Минимум: "64.0", Максимум: "1024.0"
// 
yb_object_pickup_radius "450.0"

//
// Радиус в юнитах, в пределах которого бот автоматически ломает разрушаемые объекты вокруг себя, когда не касается их.
// ---
// По умолчанию: "400.0", Минимум: "64.0", Максимум: "1024.0"
// 
yb_object_destroy_radius "400.0"

//
// Указывает путь к звуковым файлам чаттера (имитации живой болтовни ботов в голосовой чат).
// ---
// По умолчанию: "sound/radio/bot"
// 
yb_chatter_path "sound/radio/bot"

//
// Разрешает или запрещает ботам атаковать монстров (кастомных NPC-сущностей). На ЗМ это не нужно.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_attack_monsters "0"

//
// Разрешает или запрещает ботам подбирать кастомные предметы плагинов (подарки, сферы, бонусы).
// ДЛЯ ЗОМБИ РЕКОМЕНДУЕТСЯ "1", чтобы они реагировали на кастомный дроп на карте.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_pickup_custom_items "1"

//
// Разрешает ботам подбирать классические модовые предметы, такие как патроны, аптечки или защитные костюмы.
// ДЛЯ ЗОМБИ СТАВИМ "1", чтобы люди собирали патроны/аптечки, если они выпадают на сервере.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_pickup_ammo_and_kits "1"

//
// Разрешает или запрещает ботам подбирать самое лучшее и мощное оружие с земли.
// Оставляем "1", актуально для выживших людей.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_pickup_best "1"

//
// Разрешает или запрещает ботам выполнять стандартные задачи карты (ставить/дефузить бомбу, спасать заложников).
// ДЛЯ ЗОМБИ СТАВИМ "1" (Игнорировать), чтобы ИИ ботов не отвлекался на сценарии обычного CS [39.11].
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_ignore_objectives "1"

//
// Включает или выключает функцию текстового чата ботов (общение, флуд).
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_chat "1"

//
// Шанс в процентах, что бот напишет случайное сообщение в общий чат после того, как его убьют.
// ---
// По умолчанию: "30", Минимум: "0", Максимум: "100"
// 
yb_chat_percent "20"

//
// Определяет, способны ли боты стрелять по врагам сквозь стены (простреливать), если они слышат или подозревают их местоположение.
//  0 - полностью отключено.
//  1 - простреливать редко.
//  2 - стрелять со средней частотой.
//  3 - жестко зажимать сквозь стены.
// ---
// По умолчанию: "2", Минимум: "0", Максимум: "3"
// 
yb_shoots_thru_walls "2"

//
// Включает или выключает глобальный поиск врагов по всей карте.
// СТРОГО "0", иначе боты ослепнут и вообще не будут никого атаковать!
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_ignore_enemies "0"

//
// Включает или выключает проверку флагов рендеринга врага. Полезно для некоторых модов (например, против невидимок).
// ---
// Default: "0", Min: "0", Max: "1"
// 
yb_check_enemy_rendering "0"

//
// Включает или выключает проверку бессмертия врага (например, во время спавн-протекта). Полезно для некоторых модов.
// ---
// Default: "0", Min: "0", Max: "1"
// 
yb_check_enemy_invincibility "0"

//
// Включает или выключает способность бота наносить сильный колющий удар ножом (Stab) в упоре, если бот находится в хорошем состоянии.
// СТРОГО "1" — это заставит зомби-ботов жестко нападать с разбега когтями.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_stab_close_enemies "1"

//
// Использует игровой движок PVS (Potentially Visible Set) для проверки потенциальной видимости врага. Снижает нагрузку на CPU на больших картах.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_use_engine_pvs_check "0"

//
// Использует прицеливание по хитбоксам моделей врагов вместо стандартного оффсетного прицеливания. 
// Рекомендуется использовать со значением "1", если включен параметр yb_use_engine_pvs_check, для экономии ресурсов процессора.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_use_hitbox_enemy_targeting "0"

//
// Боты будут учитывать стекло и прозрачные двери при принятии решения открыть огонь по противнику. Требуется только для специфических карт.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_aim_trace_consider_glass "0"

//
// Назначает указанную клавишу на клавиатуре для быстрого открытия встроенного меню управления ботами YaPB.
// ---
// По умолчанию: "="
// 
yb_bind_menu_key "="

//
// Указывает список консольных команд ботов через запятую, которые НЕ будут сбрасываться/перезаписываться конфигом при смене карты (changelevel).
// ---
// По умолчанию: "yb_quota,yb_autovacate"
// 
yb_ignore_cvars_on_changelevel "yb_quota,yb_autovacate"

//
// Значение пароля для ключа setinfo. Если администратор вводит правильный пароль, он получает доступ к меню и командам ботов.
// ---
// По умолчанию: ""
// 
yb_password ""

//
// Имя ключа в setinfo, используемого для хранения и проверки пароля администратора для доступа к командам и меню ботов.
// ---
// По умолчанию: "_ybpw"
// 
yb_password_key "_ybpw"

//
// Позволяет использовать классическое убийство ботов при вызове команды завершения раунда в меню управления, вместо вызова системного gamedll endround.
// ---
// По умолчанию: "0"
// 
yb_bots_kill_on_endround "0"

//
// Включает или выключает CSDM / FFA (Дезматч) режим для ботов.
//  Допустимые значения: '0', '1', '2', '3'.
//  Если '0', CSDM / FFA режим определяется сервером автоматически.
//  Если '1', CSDM режим включен, но FFA (огонь по своим) выключен.
//  Если '2', CSDM и FFA режимы принудительно включены (каждый сам за себя).
//  Если '3', CSDM и FFA режимы принудительно выключены.
// ФИКС ОГНЯ ПО СВОИМ: СТАВИМ НА ЗОМБИ СТРОГО "1". Бесконечный респавн и дезматч включены, но своих люди расстреливать не будут!
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "3"
// 
yb_csdm_mode "1"

//
// Если включено, боты не будут применять кастомные игровые режимы, основанные на префиксах названия карт (в частности, для карт fy_ и ka_).
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_ignore_map_prefix_game_mode "0"

//
// Максимальное количество потоков процессора, которое бот будет использовать для обработки задач ИИ. Значение -1 означает использование половины доступных ядер CPU.
// ---
// По умолчанию: "-1", Минимум: "-1", Максимум: "16"
// 
yb_threadpool_workers "-1"

//
// Если включено, боты будут бросать гранаты без оглядки на тактические условия (режим безумного гренадера).
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_grenadier_mode "0"

//
// Заставляет ботов игнорировать врагов на указанное время (в секундах) при новом раунде.
// ИДЕАЛЬНО ДЛЯ ЗОМБИ ПЛЕЙГ: ставим "15" секунд (время отсчета до первого заражения) [38.1].
// ---
// По умолчанию: "0"
// 
yb_ignore_enemies_after_spawn_time "15"

//
// Указывает максимальную прочность (HP) разрушаемого объекта, который бот согласится сломать [39.11].
// ---
// По умолчанию: "500.0", Минимум: "1.0", Максимум: "3000.0"
// 
yb_breakable_health_limit "500.0"

//
// Нижний порог базового пинга бота, отображаемого в таблице счета (Scoreboard) при создании.
// ---
// По умолчанию: "5", Минимум: "0", Максимум: "100"
// 
yb_ping_base_min "5"

//
// Верхний порог базового пинга бота, отображаемого в таблице счета при создании.
// ---
// По умолчанию: "20", Минимум: "0", Максимум: "100"
// 
yb_ping_base_max "20"

//
// Учитывать пинг реальных игроков при расчете среднего пинга для ботов. Если отключено, пинг выбирается случайно.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_ping_count_real_players "1"

//
// Interval at which the fake ping gets updated in the scoreboard.
// Интервал в секундах, с которым обновляется значение фейкового пинга в таблице счета (Scoreboard).
// ---
// По умолчанию: "1.2", Минимум: "0.1", Максимум: "10.0"
// 
yb_ping_updater_interval "1.2"

//
// Указывает, должен ли бот НЕ исправлять направления старых вейпоинтов кемпинга при загрузке старого формата PWF.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_graph_fixcamp "0"

//
// Указывает URL-адрес, с которого боты смогут автоматически скачивать вейпоинты карты в случае их отсутствия.
// ---
// По умолчанию: "yapb.jeefo.net"
// 
yb_graph_url "yapb.jeefo.net"

//
// Указывает URL-адрес, на который боты будут пытаться загрузить файл вейпоинтов вашей карты в общую базу данных.
// ---
// По умолчанию: "yapb.jeefo.net/upload"
// 
yb_graph_url_upload "yapb.jeefo.net/upload"

//
// Через каждые N установленных в редакторе вейпоинтов граф путей карты будет автоматически сохраняться на диск.
// ---
// По умолчанию: "15", Минимум: "0", Максимум: "4096"
// 
yb_graph_auto_save_count "15"

//
// Максимальное расстояние в юнитах для отрисовки узлов графа путей от угла обзора в режиме редактора вейпоинтов.
// ---
// По умолчанию: "400", Минимум: "64", Максимум: "3072"
// 
yb_graph_draw_distance "400"

//
// Разрешает ботам автоматически обмениваться вашими файлами вейпоинтов с онлайн-базой данных графов.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_graph_auto_collect_db "1"

//
// Автоматически кикает ботов с сервера, чтобы освободить место для заходящих живых игроков.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_autovacate "1"

//
// Сколько свободных слотов функция автокика (autovacate) должна резервировать под заходящих людей.
// ---
// По умолчанию: "1", Минимум: "1", Максимум: "8"
// 
yb_autovacate_keep_slots "1"

//
// Кикает бота с сервера незамедлительно в ту же секунду, когда человек начинает подключаться (yb_autovacate должно быть вкл).
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_kick_after_player_connect "1"

//
// Общее количество ботов, которое будет добавлено в игру на сервере.
// ---
// По умолчанию: "9", Минимум: "0", Максимум: "32"
// 
yb_quota "9"

//
// Указывает тип управления квотой ботов.
//  Допустимые значения: 'normal' (нормальный), 'fill' (заполнение) и 'match' (соответствие).
//  Если 'fill', сервер будет регулировать число ботов так, чтобы держать ровно N игроков на сервере, где N — это yb_quota.
//  Если 'match', сервер будет поддерживать соотношение 1 к N (люди к ботам), где N — это yb_quota_match.
// ---
// По умолчанию: "normal"
// 
yb_quota_mode "normal"

//
// Количество игроков для баланса сил, если параметр yb_quota_mode выставлен в значение 'match'.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "32"
// 
yb_quota_match "0"

//
// Определяет, сколько раз в секунду будет выполняться код мышления ботов (FPS мыслительного цикла ИИ).
// ---
// По умолчанию: "30.0", Минимум: "24.0", Максимум: "90.0"
// 
yb_think_fps "30.0"

//
// Указывает количество времени в секундах, после которого боты будут автоматически убиты, если на сервере не осталось живых людей.
// ---
// По умолчанию: "0.0", Минимум: "0.0", Максимум: "90.0"
// 
yb_autokill_delay "0.0"

//
// Перезапускать игру (sv_restart), когда самый первый живой человек заходит на сервер к ботам.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_first_human_restart "0"

//
// Определяет, должны ли боты заходить на сервер только тогда, когда в игре присутствует хотя бы один живой человек.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_join_after_player "0"

//
// Насильно заставляет всех создаваемых ботов заходить строго за указанную здесь команду ('any' - за любую, 'T' - террористы, 'CT' - контры).
// ---
// По умолчанию: "any"
// 
yb_join_team "any"

//
// Указывает, через сколько секунд боты начнут заходить на сервер после смены карты (changelevel).
// ---
// По умолчанию: "5.0", Минимум: "0.0", Максимум: "30.0"
// 
yb_join_delay "5.0"

//
// Текстовый префикс, который будет автоматически дописываться перед никнеймом каждого создаваемого бота (например: [BOT]).
// ---
// По умолчанию: ""
// 
yb_name_prefix ""

//
// Общий уровень сложности для всех ботов. Изменение в реальном времени сразу повлияет на уже созданных ботов.
// 0 - Нубы, 1 - Легкие, 2 - Средние, 3 - Эксперты, 4 - Жесткие машины.
// ---
// По умолчанию: "3", Минимум: "0", Максимум: "4"
// 
yb_difficulty "3"

//
// Нижний порог случайной сложности при создании бота. Влияет только на вновь создаваемых ботов. Значение -1 означает использование yb_difficulty.
// ---
// По умолчанию: "-1", Минимум: "-1", Максимум: "4"
// 
yb_difficulty_min "-1"

//
// Верхний порог случайной сложности при создании бота. Влияет только на вновь создаваемых ботов. Значение -1 означает использование yb_difficulty.
// ---
// По умолчанию: "-1", Минимум: "-1", Максимум: "4"
// 
yb_difficulty_max "-1"

//
// Позволяет каждому боту самостоятельно балансировать свой уровень сложности на основе K/D-соотношения (убийств/смертей) команды.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_difficulty_auto "0"

//
// Временной интервал в секундах, с которым боты будут пересчитывать и автоматически балансировать свою сложность.
// ---
// По умолчанию: "30", Минимум: "30", Максимум: "240"
// 
yb_difficulty_auto_balance_interval "30"

//
// Включает или выключает отображение кастомных аватарок перед именами ботов в таблице счета TAB. Обратите внимание, что вы сможете увидеть аватарки только ваших друзей в Steam.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_show_avatars "0"

//
// Включает отображение задержки сети (пинга) в таблице счета TAB.
//  Допустимые значения: '0', '1', '2'.
//  Если '0', ничего не отображается (пинг скрыт).
//  Если '1', в графе пинга выводится фиксированная надпись 'BOT'.
//  Если '2', выводится красивый имитированный фейковый пинг (Рекомендуется под ЗМ серваки) [39.13].
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "2"
// 
yb_show_latency "2"

//
// Позволяет сохранять имена ботов при смене карты (changelevel), чтобы никнеймы ботов оставались прежними после перезапуска раундов.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_save_bots_names "1"

//
// Указывает желаемый внутренний скин (модельку) для ботов, играющих за команду Террористов (0 - выбирать случайно).
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "5"
// 
yb_botskin_t "0"

//
// Указывает желаемый внутренний скин (модельку) для ботов, играющих за команду Контр-Террористов (0 - выбирать случайно).
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "5"
// 
yb_botskin_ct "0"

//
// Задает предпочитаемый характер/личность по умолчанию при создании ботов менеджером квоты.
//  Допустимые значения: 'none' (рандом), 'normal' (обычный), 'careful' (осторожный), 'rusher' (рашер).
//  Если указано 'none', личность бота выбирается абсолютно случайно.
// ---
// По умолчанию: "none"
// 
yb_preferred_personality "none"

//
// Временной интервал в секундах, с которым боты поочередно добавляются в игру.
// ---
// По умолчанию: "0.1", Минимум: "0.1", Максимум: "1.0"
// 
yb_quota_adding_interval "0.1"

//
// Временной интервал в секундах, с которым проверяется общее соблюдение квоты ботов на сервере.
// ---
// По умолчанию: "0.4", Минимум: "0.4", Максимум: "2.0"
// 
yb_quota_maintain_interval "0.4"

//
// Указывает язык для системных текстовых сообщений и внутреннего меню управления ботами.
// ---
// По умолчанию: "en"
// 
yb_language "ru"

//
// Разрешает или запрещает ботам кемперить (занимать глухие оборонительные позиции, крысить). 
// Не влияет на задачи защиты установленной бомбы или удержания заложников.
// ДЛЯ ЗОМБИ СТРОГО ВЫСТАВЛЯЕМ СИЛЬНОЕ "0"! Зомби-боты обязаны безостановочно рашить и штурмовать нычки [39.11]!
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_camping_allowed "0"

//
// Нижний временной порог в секундах, из которого рассчитывается время сидения бота в засаде (при включенном кемпинге).
// ---
// По умолчанию: "15.0", Минимум: "5.0", Максимум: "90.0"
// 
yb_camping_time_min "5.0"

//
// Верхний временной порог в секундах, до которого рассчитывается время сидения бота в кемпинге.
// ---
// По умолчанию: "45.0", Минимум: "15.0", Максимум: "120.0"
// 
yb_camping_time_max "15.0"

//
// Разрешает или запрещает ботам совершать случайные удары ножом/когтями в воздух, когда бот быстро рашит вперед и поблизости нет явных врагов.
// ОБЯЗАТЕЛЬНО СТАВИМ "1" — это заставит орды зомби на бегу яростно размахивать лапами, создавая нужную ЗМ атмосферу!
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_random_knife_attacks "1"

//
// Максимальное количество узлов пути (нод графа вейпоинтов) для прогнозирования траектории движения врага.
// ---
// По умолчанию: "22", Минимум: "15", Максимум: "256"
// 
yb_max_nodes_for_predict "22"

//
// Включает или полностью отключает скрытый экстремально сложный режим "Extra Hard" ИИ машин для ботов.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_whose_your_daddy "0"

//
// Имитирует живой онлайн на сервере за счет периодических случайных отключений и подключений ботов (имитация захода/выхода людей).
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_rotate_bots "0"

//
// Указывает минимальное количество секунд, которое бот гарантированно проведет на сервере, если активен режим ротации (yb_rotate_bots 1).
// ---
// По умолчанию: "360.0", Минимум: "120.0", Максимум: "7200.0"
// 
yb_rotate_stay_min "360.0"

//
// Указывает максимальное количество секунд, которое бот проведет на сервере перед симуляцией выхода, если активна ротация.
// ---
// По умолчанию: "3600.0", Минимум: "1800.0", Максимум: "14400.0"
// 
yb_rotate_stay_max "3600.0"

//
// Если включено, боты не будут пытаться оббегать и избегать столкновений со своими товарищами по команде на узких путях. Использовать, если на сервере установлены плагины Semiclip.
// ДЛЯ ЗОМБИ СТРОГО СТАВИМ "1", так как на ЗМ серверах люди проходят сквозь людей, и это уберет застревания толпы на спавне!
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_has_team_semiclip "1"

//
// Determines the maximum slope height change between the current and next node to consider the current link as a jump link. Only for generated graphs.
// Определяет максимальный перепад высоты склона между текущей и следующей точками пути, чтобы считать данную связь прыжковой (Jump Link). Только для генерируемых графов.
// ---
// По умолчанию: "24.0", Минимум: "12.0", Максимум: "48.0"
// 
yb_graph_slope_height "24.0"

//
// Выбор режима эвристической функции расчета путей. Исключительно для целей отладки разработчиками.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "4"
// 
yb_path_heuristic_mode "0"

//
// Ограничивает максимальный объем памяти (в мегабайтах) под матрицы Floyd-Warshall. Если лимит превышен — автоматически включается цикл Дейкстры (Dijkstra).
// ---
// По умолчанию: "6", Минимум: "0", Максимум: "32"
// 
yb_path_floyd_memory_limit "6"

//
// Использует простой расчет путей по прямой дистанции вместо запуска полного тяжелого цикла Dijkstra. Используется только когда матрицы Floyd недоступны из-за лимитов памяти.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_path_dijkstra_simple_distance "1"

//
// Включает механизм пост-сглаживания для алгоритма A*. Снижает угловатые зигзаги при беге ботов по вейпоинтам ценой небольшого количества циклов процессора.
// РЕКОМЕНДУЕТСЯ "1", чтобы боты бегали по плавным траекториям, а не дергались углами.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_path_astar_post_smooth "1"

//
// Рандомизирует алгоритмы поиска путей ботами в начале каждого нового раунда, чтобы они выбирали разные маршруты для атаки.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_path_randomize_on_round_start "1"

//
// Включает или полностью отключает показ приветственного текста YaPB хосту (вам) при запуске игры.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_display_welcome_text "1"

//
// Включает хук фейковых ответов на запросы к серверу (Server Query), отображая ботов как реальных игроков в глобальном поиске серверов браузера.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_enable_query_hook "0"

//
// Разрешает или запрещает ботам генерировать и возвращать фейковые уникальные значения Steam ID.
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "1"
// 
yb_enable_fake_steamids "0"

//
// Влияние облаков дыма от дымовых гранат на зрение бота.
// ДЛЯ ЗОМБИ СТАВИМ "0" (Отключить проверки дыма), так как на ЗМ вместо дыма обычно гранаты заморозки или света, и этот квар зря грузит процессор.
// ---
// По умолчанию: "2", Минимум: "0", Максимум: "2"
// 
yb_smoke_grenade_checks "0"

//
// Радиус проверки наличия облака дыма вокруг сдетонировавшей гранаты.
// ---
// По умолчанию: "240", Минимум: "32", Максимум: "320"
// 
yb_smoke_grenade_radius "240"

//
// Определяет, разрешено ли ботам использовать тихий ход (передвижение скрытно на Shift), если они предполагают, что поблизости находится враг.
// СТРОГО СТАВИМ "0"! На ЗМ скрытность не нужна, боты всегда должны атаковать на полной скорости.
// ---
// По умолчанию: "1", Минимум: "0", Максимум: "1"
// 
yb_walking_allowed "0"

//
// Режим работы контекстного поведения ИИ бота на карте.
//  Допустимые значения: '0', '1', '2'.
//  Если '0', нормальное классическое поведение Counter-Strike (cs/de сценарии).
//  Если '1', CSDM режим (Deathmatch).
//  Если '2', режим Zombie Mode (боты полностью переключают логику под зомби-серверы).
// СТРОГО СТАВИМ "2" — это заставит встроенный ИИ YaPB подстроиться под RePlagueZ [39.11].
// ---
// По умолчанию: "0", Минимум: "0", Максимум: "2"
// 
yb_conmod "2"

//
// Время в секундах, в течение которого боты полностью игнорируют врагов на старте раунда. Полезно для Zombie Plague модов во время отсчета до первого заражения [38.1].
// ---
// По умолчанию: "0"
// 
yb_zm_ignore_enemy_time "15"
