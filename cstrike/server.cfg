// ===================================================================
// ГЛАВНЫЙ КОНФИГ СЕРВЕРА REHLDS (ZOMBIE PLAGUE 5.0) — server.cfg
// ===================================================================

// Название твоего сервера в поиске (измени текст в кавычках на свой)
hostname "[EVANGELION #1] | Zombie Plague: Reborn"

// RCON-пароль для управления сервером через консоль (сделай сложным!)
rcon_password "xP8$kM2_vA9!t"

// Пароль для входа на сервер (оставь пустым, чтобы сервер был открыт для всех)
sv_password ""


// [БАЗОВЫЕ НАСТРОЙКИ ИГРЫ]
sv_aim 0                  // Выключить автоприцеливание (автоаим)
pausable 0                // Запретить игрокам ставить сервер на паузу
sv_cheats 0               // Запретить встроенные читы (noclip, godmode)
mp_timelimit 20           // Время игры на одной карте в минутах (после этого будет смена)
mp_chattime 5             // Сколько секунд игроки могут общаться после окончания карты


// [ФИЗИКА И ПЕРЕДВИЖЕНИЕ]
// Важно для ZP: лимит скорости 500, так как зомби бегают быстро, а люди прыгают на джетпаках/баннихопе
sv_maxspeed 500           
sv_gravity 800            // Стандартная гравитация сервера


// [ИДЕАЛЬНЫЕ РЕЙТЫ ДЛЯ REHLDS — ЧТОБЫ НЕ ЛАГАЛО ПРИ 32/32]
sys_ticrate 1100          // FPS серверной части (стабильные 1000+ FPS для идеальной стрельбы)
sv_maxrate 100000         // Максимальный сетевой рейт для игроков со скоростным интернетом
sv_minrate 25000          // Минимальный рейт (отсекает игроков с лагающим интернетом)
sv_maxupdaterate 102      // Сколько пакетов в секунду сервер может отправить игроку
sv_minupdaterate 30       // Минимальное количество пакетов


// [НАСТРОЙКИ БЕЗОПАСНОСТИ И СЕТИ]
sv_proxies 1              // РАЗРЕШАЕТ твоему HLTV заходить на сервер для записи демок
sv_lan 0                  // Сервер доступен для всего интернета, а не только для локалки
sv_region 3               // Регион сервера: Европа/Россия (помогает в поиске)
sv_allowdownload 1        // Разрешить игрокам скачивать файлы (модели, звуки зомби) напрямую с сервера
sv_allowupload 0          // Запретить игрокам загружать свои файлы (спреи) на сервер

// [НАСТРОЙКИ ДЛЯ КОРРЕКТНОЙ РАБОТЫ БОТОВ НА REHLDS]
sv_delayed_spray_upload 1 // Задержка загрузки спреев (чтобы боты не лагали)
reauthcheck_max_fake_players 32 // Разрешить до 32 ботов (если стоит плагин ReAuthCheck)
sv_auto_reload_plugins 0  // Выключить автоперезапуск плагинов при смене карты


echo "========================================="
echo "   [ReHLDS] server.cfg успешно загружен!  "
echo "========================================="
