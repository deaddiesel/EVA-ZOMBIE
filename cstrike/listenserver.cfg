// ===================================================================
// КОНФИГ ЛОКАЛЬНОГО СЕРВЕРА (ОДИНАРНАЯ ИГРА / БОТЫ) — listenserver.cfg
// ===================================================================
// Этот файл срабатывает КАЖДЫЙ РАЗ при смене карты в одиночной игре.
// Выделенный сервер (hlds.exe) этот конфиг полностью игнорирует.

// [БАЗОВЫЕ НАСТРОЙКИ ДЛЯ ИГРЫ С БОТАМИ]
sv_aim 0                  // Выключить автоприцеливание (автоаим)
pausable 0                // Запретить ставить игру на паузу в сетевом режиме
sv_cheats 0               // Запретить встроенные читы (разрешить можно командой sv_cheats 1)
mp_timelimit 20           // Время игры на одной карте (20 минут), затем пойдет смена
mp_chattime 5             // Сколько секунд висит таблица счета в конце карты


// [ФИЗИКА И ОГРАНИЧЕНИЯ]
sv_maxspeed 320           // Максимальная скорость бега для обычной CS 1.6
sv_gravity 800            // Стандартная гравитация игры


// [СЕТЕВЫЕ НАСТРОЙКИ ДЛЯ ДРУЗЕЙ ПО LAN]
// Если к твоей одиночной игре по Wi-Fi подключатся друзья, эти рейты уберут лаги
sys_ticrate 200           // FPS для локального сервера (для одиночки больше не нужно)
sv_maxrate 25000          // Пропускная способность для локальной сети
sv_maxupdaterate 101      // Количество пакетов в секунду для локальных игроков


echo "========================================="
echo " [LAN] listenserver.cfg успешно загружен! "
echo "========================================="
