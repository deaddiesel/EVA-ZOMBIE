echo [ReGameDLL] Настройки загружены.

# mp_freeforall (0 / 1) - Режим "Каждый сам за себя" (Free For All / Deathmatch)
# 0 = Выключено. Обычная командная игра (Зомби против Людей).
# 1 = Включено. Режим FFA (все игроки враги друг другу, можно убивать союзников).
# ДЛЯ ЗОМБИ: Оставляем строго "0", иначе люди перебьют друг друга прямо в нычках.
mp_freeforall "0"

# mp_autoteambalance (0 / 1 / 2) - Автоматический баланс количества игроков в командах
# 0 = Полностью выключено. Движок не вмешивается в составы команд.
# 1 = Включено. Движок выравнивает команды по количеству игроков в конце раунда.
# 2 = Включено. Движок насильно перекидывает игроков прямо посреди раунда.
# ДЛЯ ЗОМБИ: Ставим строго "0"! Для движка игры Зомби и Выжившие — это Террористы и Контры. Если оставить 1 или 2, сервер начнет принудительно превращать зомби в людей и обратно для "равенства", полностью ломая логику Zombie Plague.
mp_autoteambalance "0"

# mp_buytime (число в минутах) - Время на покупку оружия в начале раунда
# -1 = Время не ограничено, закупаться можно весь раунд.
#  0 = Стандартная закупка полностью отключена.
# Любое другое число (например, 0.25) = Закупка работает первые 15 секунд раунда.
# ДЛЯ ЗОМБИ: Ставим "-1". Классическое меню закупки CS 1.6 (клавиша B) в зомби-модах блокируется. Оружие и кастомные предметы покупаются через меню самого мода (на клавишу M) за аммо-паки в любую секунду раунда.
mp_buytime "-1"

# mp_maxmoney (число) - Максимальный лимит обычных денег в игре (до 999999)
# ДЛЯ ЗОМБИ: Оставляем стандартные "16000". Зомби-мод использует собственную валюту (аммо-паки / кредиты), а обычные доллары скрыты или не используются, так что этот лимит ни на что не повлияет.
mp_maxmoney "16000"

# mp_round_infinite (0 / 1 / буквенные флаги) - Режим бесконечного раунда
# a — полностью отключает проверку времени раунда (таймер доходит до 0:00, но игра идет дальше).
# b — отключает проверку на минимальное количество игроков (раунд не закончится, даже если на сервере остался 1 человек).
# c — отключает сценарий с убийством или спасением VIP (для карт as_).
# d — отключает сценарий побега из тюрьмы (для карт es_).
# e — отключает сценарий со взрывом или дефузом бомбы (для карт de_).
# f — отключает проверку на полное уничтожение команды (если все люди умерли, раунд не закончится, пока не выйдет время).
# g — отключает сценарий со спасением заложников (для карт cs_).
# h, i, j, k — локальные блокировки окончания времени строго для VIP, Тюрьмы, Бомбы и Заложников соответственно.

# 0 = Выключено. Раунд идет строго по таймеру и заканчивается при победе одной из сторон (стандарт).
# 1 = Включено. Раунд никогда не закончится, таймер застынет (режим бесконечного мяса).
# флаги (например, "ae") = Блокирует только определенные условия конца раунда (время, взрыв бомбы и т.д.).
# ДЛЯ ЗОМБИ: Оставляем строго "0". В зомби-моде раунды должны вовремя заканчиваться, чтобы запускались новые режимы (Немезида, Выживший, Множественное заражение). Всем этим процессом рулит сам зомби-мод.
mp_round_infinite "0"

# mp_roundover (0 / 1 / 2 / 3) - Что происходит, когда истекает время раунда на картах БЕЗ сценария (без бомбы/заложников)
# 0 = Выключено. Ничего не происходит, раунд продолжается дальше (стандарт игры).
# 1 = Раунд заканчивается технической ничьей.
# 2 = Раунд заканчивается победой команды Террористов (в нашем случае — Зомби).
# 3 = Раунд заканчивается победой команды Контр-Террористов (в нашем случае — Людей).
# ДЛЯ ЗОМБИ: Ставим строго "3". Карты с префиксом zm_ не имеют сценария. Если время раунда вышло, а зомби не смогли добраться до людей в нычках и заразить их, то победа по логике должна присуждаться Выжившим (КТ). Значит, ставим 3.
mp_roundover "3"

# mp_round_restart_delay (число в секундах) - Задержка перед стартом нового раунда
# Задает время, на которое замирает игра после того, как высветилась надпись о победе одной из команд. 
# ДЛЯ ЗОМБИ: По умолчанию стоит 5 секунд, но для мясного зомби-сервера лучше поставить "3". Это уменьшит время скучного ожидания для игроков на спавне, и новый раунд начнется быстрее.
mp_round_restart_delay "3"

# mp_hegrenade_penetration (0 / 1) - Прострел взрывной гранаты (HE) сквозь стены
# 0 = Выключено. Стены и двери полностью защищают от взрыва гранаты (стандарт игры).
# 1 = Включено. Осколки и урон от взрыва пролетают насквозь через стены и объекты.
# ДЛЯ ЗОМБИ: Оставляем строго "0". Иначе люди будут закидывать гранатами стены нычек снаружи, убивая зомби внутри, или наоборот. Это полностью сломает баланс карт.
mp_hegrenade_penetration "0"

# mp_nadedrops (0 / 1 / 2) - Выпадение гранат на землю после смерти игрока
# 0 = Выключено. Из мертвых игроков гранаты не выпадают (они просто исчезают).
# 1 = Включено. После смерти выпадает первая попавшаяся граната из инвентаря игрока.
# 2 = Включено. После смерти игрока на землю высыпаются вообще все его гранаты.
# ДЛЯ ЗОМБИ: Ставим строго "0". На зомби-серверах гранаты (особенно зажигательные и замораживающие) — это мощное кастомное оружие. Если из каждого убитого человека они будут выпадать, выжившие соберут огромный склад гранат в одной нычке, и зомби никогда туда не зайдут. К тому же, сотни гранат на полу задушат сервер лагами.
mp_nadedrops "0"

# mp_weapondrop (0 / 1 / 2 / 3) - Выпадение оружия из рук после смерти игрока
# 0 = Выключено. Оружие мертвеца не выпадает на землю, а сразу удаляется из игры.
# 1 = Включено. На землю выпадает самое тяжелое и дорогое оружие (автомат/винтовка) (стандарт).
# 2 = Включено. На землю выпадает строго то оружие, которое игрок держал в руках в момент смерти.
# 3 = Включено. Выпадает вообще всё оружие (и автомат, и пистолет).
# ДЛЯ ЗОМБИ: Настоятельно рекомендуется поставить "0". Когда зомби заражает человека, человек мгновенно умирает и возрождается за зомби. Если из каждого зараженного будет выпадать автомат, карта превратится в свалку оружия. Ставим "0", чтобы очищать сервер от мусора. Если у тебя в самом зомби-моде встроен кастомный плагин-очиститель дропа, можно оставить "1".
mp_weapondrop "0"

# mp_ammodrop (0 / 1 / 2) - Выпадение патронов на землю вместе с оружием
# 0 = Выключено. Патроны никогда не выпадают отдельными коробками (остаются «внутри» игрока).
# 1 = Включено. Патроны выпадают на пол только после смерти игрока (стандарт).
# 2 = Включено. Патроны выпадают всегда, когда игрок вручную выбрасывает оружие на G.
# ДЛЯ ЗОМБИ: Ставим строго "0", чтобы не засорять карту лишними мелкими коробками с патронами.
mp_ammodrop "0"

# mp_roundrespawn_time (число в секундах) - Лимит времени для появления на спавне в начале раунда
# Сколько секунд со старта раунда новому подключившемуся игроку разрешено автоматически возродиться в игру.
# -1 = Лимита времени нет (игрок может появиться в любую секунду раунда).
# ДЛЯ ЗОМБИ: Оставляем стандартные "20". Если выставить слишком много или поставить "-1", игроки смогут заходить посреди раунда, сразу появляться за людей и ломать баланс раунда.
mp_roundrespawn_time "20"

# mp_auto_reload_weapons (0 / 1) - Автоматическая перезарядка оружия при возрождении
# 0 = Выключено. Оружие остается с тем количеством патронов, которое было в момент прошлой смерти.
# 1 = Включено. При появлении игрока на спавне его автомат и пистолет сразу имеют полные обоймы.
# ДЛЯ ЗОМБИ: Ставим "1". Это базовое удобство для игроков, чтобы они не тратили первые секунды раунда на перезарядку.
mp_auto_reload_weapons "1"

# mp_refill_bpammo_weapons (0 / 1 / 2 / 3) - Автоматическое восполнение запаса патронов в рюкзаке
# 0 = Выключено. Патроны в запас нужно докупать вручную клавишами закупки.
# 1 = Патроны восполняются до максимума только один раз — при появлении игрока на спавне.
# 2 = Патроны восполняются при спавне, а также автоматически докидываются при покупке оружия.
# 3 = Патроны в рюкзаке автоматически пополняются ДО МАКСИМУМА при КАЖДОЙ перезарядке оружия.
# ДЛЯ ЗОМБИ: Ставим строго "3". Этот режим создан автором ReGameDLL специально для Zombie Mod [3]. Теперь людям вообще не нужно заботиться о покупке патронов: как только они перезаряжают свой автомат, патроны в запасе сами мгновенно становятся полными.
mp_refill_bpammo_weapons "3"

# mp_infinite_ammo (0 / 1 / 2) - Полностью бесконечные патроны (для стрельбы без остановки)
# 0 = Выключено. Патроны тратятся, оружию требуется перезарядка (стандарт).
# 1 = Бесконечные патроны в обойме. Можно зажать левую кнопку мыши и стрелять без остановки часами.
# 2 = Бесконечные патроны в запасе (в рюкзаке), но перезарядка оружия все равно нужна.
# ДЛЯ ЗОМБИ: Оставляем строго "0". Если поставить 1, люди зажмут пулеметы в нычках, и зомби физически не смогут к ним подойти. Перезарядка оружия — это единственный шанс для зомби сделать рывок и заразить человека. А бесконечный запас в рюкзаке у нас и так уже включен через прошлый квар `mp_refill_bpammo_weapons 3`.
mp_infinite_ammo "0"

# mp_infinite_grenades (0 / 1) - Бесконечные гранаты
# 0 = Выключено. Брошенная граната тратится и исчезает.
# 1 = Включено. Гранаты никогда не кончаются (бросил — в руке сразу появляется новая).
# ДЛЯ ЗОМБИ: Ставим строго "0". Бесконечные кастомные гранаты (огненные коктейли Молотова, заморозки) устроят на сервере кошмар и убьют FPS.
mp_infinite_grenades "0"

# mp_auto_join_team (0 / 1) - Автоматический вход в команду при подключении
# 0 = Выключено. Игрок сам выбирает команду (КТ/Т/Зрители) через меню при входе (стандарт).
# 1 = Включено. Движок насильно закидывает игрока в команду без показа выбора.
# ДЛЯ ЗОМБИ: Оставляем "0". Распределением игроков по командам в начале раунда должен управлять исключительно плагин Zombie Plague. Встроенный квар игры здесь будет только мешать кастомным меню выбора.
mp_auto_join_team "0"

# mp_max_teamkills (число) - Максимальное число убийств своих до автоматического кика с сервера
# 0 = Функция автокика за тимкилл полностью отключена.
# Любое число (например, 3) = Если игрок убьет 3 союзников, сервер автоматически кикнет его.
# ДЛЯ ЗОМБИ: Оставляем стандартные "3". Так как огонь по своим у нас будет полностью отключен, игроки физически не смогут наносить урон людям или зомби из своей команды, поэтому этот квар просто спит.
mp_max_teamkills "3"

# mp_ct_default_grenades (строка с названиями гранат)
# Задает гранаты, которые выжившие бесплатно получают в руки при каждом спавне (hegrenade, flash, sgren).
# ДЛЯ ЗОМБИ: Оставляем пустым "". Все кастомные гранаты (зажигательные, световые-заморозки, бактериологические) игроки должны покупать в магазине мода за аммо-паки.
mp_ct_default_grenades ""

# mp_ct_give_player_knife (0 / 1) - Бесплатный нож для людей при спавне
# 0 = Выключено (игрок появляется с пустыми руками).
# 1 = Включено (игроку выдается стандартный нож).
# ДЛЯ ЗОМБИ: Ставим строго "1". Нож необходим движку GoldSrc для правильного расчета анимаций и скорости бега человека. К тому же, если у человека кончатся патроны, нож — его последнее средство защиты.
mp_ct_give_player_knife "1"

# mp_ct_default_weapons_primary (строка с названием оружия)
# Принудительно выдает бесплатный автомат или винтовку людям при спавне (например: "m4a1", "ak47").
# ДЛЯ ЗОМБИ: Оставляем пустым "". Выбор оружия на зомби-серверах происходит через удобное встроенное меню самого зомби-мода при старте раунда. Если прописать пушку здесь, она будет выдаваться насильно, забивать инвентарь и падать на пол лишним мусором.
mp_ct_default_weapons_primary ""

# mp_ct_default_weapons_secondary (строка с названием пистолета)
# Принудительно выдает бесплатный пистолет людям при спавне (по умолчанию: "usp").
# ДЛЯ ЗОМБИ: Полностью очищаем и оставляем пустым "". Если не убрать "usp", у людей в каждом раунде будет появляться стандартный пистолет, который им не нужен, и они будут массово выбрасывать его на землю, создавая лаги.
mp_ct_default_weapons_secondary ""

# mp_default_weapons_random (0 / 1) - Выдача случайного оружия из списков выше
# 0 = Выключено. Игроки получают строго то, что написано в кварках (в нашем случае — ничего, кроме ножа).
# 1 = Включено. Если в списках указано несколько пушек через пробел, движок выберет одну случайную.
# ДЛЯ ЗОМБИ: Оставляем "0".
mp_default_weapons_random "0"

# mp_free_armor (0 / 1 / 2) - Бесплатный бронежилет игрокам при появлении на спавне
# 0 = Броня не выдается, игроки появляются без защиты (стандарт игры).
# 1 = Выдавать бесплатный легкий бронежилет (Kevlar) без шлема.
# 2 = Выдавать бесплатный полный бронежилет и шлем (Kevlar + Helmet).
# ДЛЯ ЗОМБИ: Ставим строго "0". В зомби-модах броня выполняет важнейшую роль — она защищает человека от первого укуса зомби (вместо заражения снимается броня). Её нужно покупать отдельно в магазине за аммо-паки. Бесплатный шлем на спавне полностью убьет этот элемент выживания.
mp_free_armor "0"

# mp_team_flash ( -1 / 0 / 1 ) - Ослепление световой гранатой (Flashbang) игроков своей команды
# -1 = Вспышка вообще никого не слепит (даже того игрока, который её бросил).
# 0  = Вспышка не слепит союзников по команде, но ослепляет врагов и самого бросившего.
# 1  = Вспышка слепит вообще всех без разбора, кто развернут лицом к гранате (стандарт CS 1.6).
# ДЛЯ ЗОМБИ: Ставим строго "0" или "-1"! Люди на зомби-серверах держат оборону толпой в узких нычках и вентиляциях. Если оставить "1", то одна случайная или специально брошенная флешка ослепит всю оборону, зомби мгновенно вбегут и заразят всех людей. Это гарантирует дисбаланс и токсичность в чате.
mp_team_flash "0"

# sv_allchat (0 / 1) - Общий текстовый чат для всех на сервере
# 0 = Живые игроки не видят сообщений от мертвых, а Контр-Террористы не видят чат Террористов (стандарт).
# 1 = Текстовый чат полностью открыт: все видят сообщения всех (живые, мертвые, зомби, люди и зрители).
# ДЛЯ ЗОМБИ: Ставим строго "1". Зомби-сервер — это в первую очередь фан и общение. Мертвые игроки и зараженные зомби должны иметь возможность переписываться с выжившими людьми, чтобы обсуждать раунд или шутить, иначе игроки будут скучать и уходить.
sv_allchat "1"

# sv_autobunnyhopping (0 / 1) - Встроенный автоматический распрыг (Auto Bunnyhop)
# 0 = Выключено. Для прыжка нужно каждый раз нажимать пробел (стандарт игры).
# 1 = Включено. Достаточно зажать кнопку прыжка (пробел), и персонаж будет сам непрерывно прыгать при приземлении.
# ДЛЯ ЗОМБИ: Ставим "0". Автобхоп сильно ломает физику зомби-мода: люди смогут улетать от зомби на огромных скоростях. Если прыжки понадобятся для определенных классов зомби, мы настроим их отдельно через AMXX плагины (например, Long Jump для Клаймб-зомби).
sv_autobunnyhopping "0"

# sv_enablebunnyhopping (0 / 1) - Снятие лимита на максимальную скорость при прыжках
# 0 = Выключено. Движок жестко тормозит игрока, если его скорость превышает стандартный лимит бега.
# 1 = Включено. Лимит скорости снят, игрок может разгоняться прыжками до бесконечности.
# ДЛЯ ЗОМБИ: Ставим "0". Оставляем стандартное ограничение скорости, чтобы игроки не летали по карте.
sv_enablebunnyhopping "0"

# mp_plant_c4_anywhere (0 / 1) - Установка бомбы C4 в любом месте карты
# 0 = Выключено. Бомбу можно ставить только на официальных плентах (A и B).
# 1 = Включено. Бомбу можно заложить на любой текстуре, в любой точке карты.
# ДЛЯ ЗОМБИ: Оставляем "0". На zm_ картах бомбы нет, этот параметр не используется.
mp_plant_c4_anywhere "0"

# mp_give_c4_frags (число) - Количество фрагов (очков в табло), получаемых за взрыв или дефуз бомбы
# ДЛЯ ЗОМБИ: Оставляем стандартное значение "3", квар не задействован на зомби-картах.
mp_give_c4_frags "3"

# mp_hostages_rescued_ratio (число от 0.0 до 1.0) - Процент спасенных заложников для победы КТ в раунде
# ДЛЯ ЗОМБИ: Оставляем стандартные "1.0", квар не используется.
mp_hostages_rescued_ratio "1.0"

# mp_legacy_vehicle_block (0 / 1) - Старая физика блокировки транспорта (машин/поездов на карте)
# 0 = Новая улучшенная физика мультиплеера (транспорт плавно толкает игрока).
# 1 = Старая физика CS 1.6 (транспорт может мгновенно раздавить насмерть или забаговать игрока).
# ДЛЯ ЗОМБИ: Ставим "0". На некоторых зомби-картах есть движущиеся платформы, лифты или поезда. Новая физика защитит игроков от случайных багов и нелепых смертей при касании этих объектов.
mp_legacy_vehicle_block "0"

# mp_dying_time (число в секундах) - Задержка перед переходом в режим наблюдения после смерти
# Задает время, в течение которого мертвый игрок видит свою лежащую модельку на земле глазами трупа, перед тем как у него включится свободная камера спектатора.
# ДЛЯ ЗОМБИ: По умолчанию стоит 3 секунды, но для зомби-сервера лучше поставить "1.0" или "0". Игрок должен мгновенно понимать, что его заразили/убили, и сразу переключаться на наблюдение или подготовку к возрождению.
mp_dying_time "1.0"

# mp_deathmsg_flags (0 / буквенные флаги) - Дополнительная техническая информация в логе смертей (в правом верхнем углу экрана)
# 0 = Не отправлять дополнительную информацию.
# флаги:
#   a - Позиция, где умерла жертва (нужно для радара).
#   b - Индекс ассистента (показывает, кто помогал наносить урон перед убийством).
#   c - Особые отметки (убийство через стену, без прицела, в прыжке).
# ДЛЯ ЗОМБИ: Оставляем стандартные "abc". Это очень крутая фича ReGameDLL, так как на зомби-сервере люди часто стреляют толпой по одному боссу. Флаг "b" позволит выводить в табло ассисты (помощь в убийстве), что очень приятно для игроков.
mp_deathmsg_flags "abc"

# mp_assist_damage_threshold (число от 0 до 100) - Процент урона для засчитывания ассиста
# Задает, сколько процентов здоровья (HP) жертвы должен снести помощник, чтобы его имя высветилось в логе смерти как ассистент.
# ДЛЯ ЗОМБИ: По умолчанию стоит 40%. Для зомби-мода, где у зомби тысячи ХП, лучше оставить "40" или снизить до "30". Если один человек снес зомби 2000 ХП, а второй добил последним выстрелом, первый обязательно получит заслуженный ассист.
mp_assist_damage_threshold "40"

# mp_freezetime_duck (0 / 1) - Разрешить приседать во время фризтайма (заморозки в начале раунда)
# 0 = Выключено (игроки стоят ровно и не могут пошевелиться).
# 1 = Включено (можно приседать на месте).
# ДЛЯ ЗОМБИ: Оставляем "1". Игрокам скучно стоять просто так первые секунды, пусть разминаются.
mp_freezetime_duck "1"

# mp_freezetime_jump (0 / 1) - Разрешить прыгать на месте во время фризтайма
# 0 = Выключено.
# 1 = Включено (можно прыгать на месте, но сдвинуться со спавна нельзя).
# ДЛЯ ЗОМБИ: Оставляем "1". Позволяет игрокам проверить свой пинг и распрыгаться до старта раунда.
mp_freezetime_jump "1"

# mp_defuser_allocation (0 / 1 / 2) - Автоматическая выдача набора сапера (кусачек/дефузеров) КТ
# 0 = Наборы не выдаются (нужно покупать).
# 1 = Кусачки выдаются случайным игрокам в команде КТ.
# 2 = Кусачки бесплатно выдаются вообще ВСЕМ игрокам КТ при спавне.
# ДЛЯ ЗОМБИ: Ставим строго "0". На зомби-серверах бомбы нет, минировать нечего, поэтому иконка кусачек в HUD игроков будет абсолютно лишней.
mp_defuser_allocation "0"

# mp_location_area_info (0 / 1 / 2 / 3) - Отображение названия текущей зоны карты
# 0 = Выключено (название локации не показывается под радаром).
# 1 = Показывать текстовое название зоны (например, "Спавн КТ", "Тёмная нычка") строго под HUD-радаром.
# 2 = Показывать название зоны прямо в игровом текстовом чате (Не рекомендуется, спамит чат).
# 3 = Показывать название зоны и под радаром, и в чате одновременно.
# ДЛЯ ЗОМБИ: Оставляем "0". Большинство кастомных zm_ карт не имеют встроенной разметки зон (файлов .nav с именами локаций), поэтому функция просто будет тратить ресурсы процессора впустую.
mp_location_area_info "0"

# mp_item_respawn_time (число в секундах) - Время возрождения подбираемых вещей (аптечки, броня)
# ДЛЯ ЗОМБИ: Оставляем стандартные "30". На зомби-картах такие вещи практически не используются.
mp_item_respawn_time "30"

# mp_weapon_respawn_time (число в секундах) - Время возрождения оружия на картах, где оно лежит на полу
# ДЛЯ ЗОМБИ: Оставляем стандартные "20".
mp_weapon_respawn_time "20"

# mp_ammo_respawn_time (число в секундах) - Время возрождения коробок с патронами на полу карты
# ДЛЯ ЗОМБИ: Оставляем стандартные "20".
mp_ammo_respawn_time "20"

# mp_vote_flags (0 / буквенные флаги) - Разрешенные встроенные системы голосования движка
# 0 = Полностью отключить стандартные голосования.
#   k - Разрешить стандартное голосование за кик игрока (команда votekick в консоли).
#   m - Разрешить стандартное голосование за смену карты (команда votemap в консоли).
# ДЛЯ ЗОМБИ: Ставим строго "0". Стандартные голосования CS 1.6 очень легко забаговать или использовать для срыва игры. На зомби-серверах управление банами, киками и сменой карт передают продвинутым плагинам AMX Mod X (например, Rock The Map, Galileo, AmxBans).
mp_vote_flags "0"

# mp_votemap_min_time (число в секундах) - Минимальное время игры на карте до прописи команды votemap
# ДЛЯ ЗОМБИ: Оставляем дефолтные "180". Так как голосования выше мы отключили, этот квар просто спит.
mp_votemap_min_time "180"

# mp_flymove_method (0 / 1) - Метод расчета физики полета/падения объектов и игроков
# 0 = Стандартный метод расчета CS 1.6 (иногда вызывает подергивания моделей при падении).
# 1 = Альтернативный, более точный метод физических расчетов ReGameDLL.
# ДЛЯ ЗОМБИ: Ставим "1". Это сгладит анимации полета зомби, когда их подбрасывает гранатами или сбивает кастомным оружием.
mp_flymove_method "1"

# mp_stamina_restore_rate (число) - Скорость восстановления выносливости (стамины) после прыжка
# 0 = Выключено (стандартная механика замедления игрока после приземления).
# ДЛЯ ЗОМБИ: Оставляем "0". Расчетом скорости зомби и людей должен заниматься сам зомби-мод через настройки классов.
mp_stamina_restore_rate "0"

# mp_jump_height (число в юнитах) - Максимальная высота прыжка игрока
# Задает базовую высоту прыжка для всех моделей на сервере. Стандарт игры — 45 юнитов.
# ДЛЯ ЗОМБИ: Оставляем строго "45"! Если ты хочешь, чтобы определенные зомби прыгали очень высоко, это настраивается персонально для каждого класса в конфигах Zombie Plague (параметр Gravity), а базовую высоту прыжка движка менять нельзя, иначе люди начнут запрыгивать в нычки без подсадок.
mp_jump_height "45"

# bot_excellent_morale (0 / 1) - Постоянная высокая мораль у встроенных zBot ботов
# ДЛЯ ЗОМБИ: Оставляем "0" (так как встроенных ботов мы полностью отключили в файле game_init.cfg).
bot_excellent_morale "0"

# mp_randomspawn (0 / 1) - Случайный спавн игроков по всей карте вместо стандартных баз КТ/Т
# 0 = Выключено. Игроки появляются строго на официальных точках спавна карты (стандарт).
# 1 = Включено. Игроки будут спавниться в случайных точках всей карты (требуется готовый .nav файл пути).
# ДЛЯ ЗОМБИ: Ставим строго "0". В начале зомби-раунда все люди должны появиться вместе на спавне, чтобы успеть добежать до нычек и занять оборону до начала первого заражения. Если включить 1, людей раскидает по карте поодиночке, и зомби моментально их сожрут.
mp_randomspawn "0"

# mp_playerid_showhealth (0 / 1 / 2) - Отображение здоровья (HP) цели при наведении прицела
# 0 = Вообще не показывать здоровье цели по центру экрана.
# 1 = Показывать здоровье только при наведении на игрока СВОЕЙ команды (стандарт игры).
# 2 = Показывать здоровье вообще всех игроков при наведении прицела (и врагов, и своих).
# ДЛЯ ЗОМБИ: Ставим "2". Выжившие люди должны видеть, сколько ХП осталось у зомби, в которого они зажимают обойму, чтобы понимать, скоро ли он умрет. Это добавляет огромный интерес к стрельбе.
mp_playerid_showhealth "2"

# mp_playerid_field (0 / 1 / 2 / 3) - Какую информацию выводить под прицелом вместе с ником игрока
# 0 = Только ник игрока.
# 1 = Ник + название его команды.
# 2 = Ник + количество его здоровья в процентах.
# 3 = Ник + название команды + здоровье в процентах одновременно.
# ДЛЯ ЗОМБИ: Ставим "2" или "3". Идеально дополняет предыдущий квар.
mp_playerid_field "3"

# mp_knockback (число в юнитах) - Сила отброса (отдачи) жертвы назад при попадании пули
# Сила физического импульса, который отталкивает модельку назад, когда в неё стреляют из оружия (Scout, AWP, AK47, M4A1, Famas, Galil, M3). 
# ВАЖНО ДЛЯ ЗОМБИ: В ReGameDLL встроен этот крутой квар, но его стандартное значение — 170. На зомби-серверах силу отброса зомби (Knockback) настраивают через главный конфигурационный файл самого зомби-мода (`zombieplague.cfg`), где прописывают индивидуальный отброс под каждый пулемет и автомат. Чтобы встроенная функция движка не конфликтовала с тонкой настройкой зомби-мода, этот параметр можно оставить стандартным "170" или выставить в "0" (отключить), если зомби-мод будет жаловаться на двойной отсчет физики отталкивания. Оставь "170", если плагины зомби-мода сами перехватывают этот эвент.
mp_knockback "170"

# mp_fraglimit (число фрагов) - Лимит фрагов для автоматической смены карты
# 0 = Лимита нет, карта не сменится по количеству убийств (стандарт).
# Любое другое число = Как только лучший игрок наберет столько фрагов, начнется следующая карта.
# ДЛЯ ЗОМБИ: Оставляем строго "0". На зомби-модах фраги набиваются сотнями за раунд. Карта должна меняться только по таймеру.
mp_fraglimit "0"

# mp_timelimit (число в минутах) - Время игры на одной карте
# 0 = Время бесконечно (карта никогда сама не сменится).
# Число (например, 20) = Через 20 минут сервер автоматически запустит голосование или сменит карту.
# ДЛЯ ЗОМБИ: Оставляем "20" или "25" — это оптимальное время для ротации zm_ локаций.
mp_timelimit "20"

# mp_forcerespawn (0 / число секунд) - Повторный квар автоматического возрождения
# 0 = Выключено (игроки ждут конца раунда после смерти).
# Число (например, 1.5) = Время задержки перед тем, как мертвый игрок автоматически оживет на спавне.
# ДЛЯ ЗОМБИ: Оставляем "0". Всем процессом возрождений должен управлять сам зомби-мод.
mp_forcerespawn "0"

# mp_hostage_hurtable (0 / 1 / 2 / 3) - Нанесение урона заложникам
# 0 = Заложники полностью бессмертны.
# 1 = Урон заложникам наносят все игроки без исключения (стандарт).
# 2 = Урон наносят только Контр-Террористы (Люди).
# 3 = Урон наносят только Террористы (Зомби).
# ДЛЯ ЗОМБИ: Ставим строго "0". На зомби-картах заложников почти нет, а если они есть, пусть будут бессмертными, чтобы сервер не тратил ресурсы на расчет их ранений и криков.
mp_hostage_hurtable "0"

# mp_show_radioicon (0 / 1) - Показ зеленой иконки радио/микрофона над головой игрока
# 0 = Скрыть иконку.
# 1 = Показывать иконку над головой персонажа, когда он говорит в микрофон (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1". В узких темных нычках это отлично помогает понять, какой именно союзник сейчас кричит и просит о помощи.
mp_show_radioicon "1"

# mp_show_scenarioicon (0 / 1) - Показ системных иконок сценария карты в HUD
# 0 = Выключено (стандарт ReGameDLL).
# 1 = Включено (показывает количество живых заложников или тикающую бомбу на экране).
# ДЛЯ ЗОМБИ: Оставляем строго "0". На зомби-серверах эти иконки бесполезны и будут только перекрывать кастомные худ-сообщения самого мода.
mp_show_scenarioicon "0"

# mp_old_bomb_defused_sound (0 / 1) - Звук при успешном разминировании бомбы C4
# 0 = Воспроизводить звук победы "Counter-Terrorists win".
# 1 = Воспроизводить олдскульный звук "Bomb has been defused" (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1". На зомби-картах бомбы нет, квар ни на что не влияет.
mp_old_bomb_defused_sound "1"

# showtriggers (0 / 1) - Отображение невидимых зон карты (триггеров)
# 0 = Выключено. Карта отображается как обычно (стандарт).
# 1 = Включено. Сервер подсветит все невидимые зоны (зоны закупки, спавны, триггеры телепортов) в виде цветных кубов. Нужен только создателям карт для поиска багов.
# ДЛЯ ЗОМБИ: Оставляем строго "0", иначе у игроков перед глазами будет куча лишних текстур.
showtriggers "0"

# sv_alltalk (0 / 1 / 2 / 3 / 4 / 5) - Режим работы общего голосового чата (Микрофонов)
# 0 = Мертвые не слышат живых, КТ слышат только КТ, Т слышат только Т (стандарт классического CS).
# 1 = Полная свобода. Вообще все слышат всех в любое время раунда (живые, мертвые, КТ, Т, спектры).
# 2 = Слышно только союзников по команде (живые КТ слышат мертвых КТ, но не слышат Т).
# 3 = Как режим 2, но наблюдатели (спектакторы) могут слышать переговоры абсолютно всех.
# 4 = Живые слышат только живых (обеих команд), мертвые слышат и мертвых, и живых.
# 5 = Живые слышат только живых тиммейтов, мертвые слышат и мертвых, и живых всех команд.
# ДЛЯ ЗОМБИ: Ставим строго "1"! Зомби-мод держится на фане и постоянном общении. Люди должны переговариваться с зомби, комментировать мясные раунды, а мертвые — подсказывать живым в реальном времени. Режим "1" обязателен для удержания онлайна.
sv_alltalk "1"

# mp_item_staytime (число в секундах) - Время исчезновения брошенного на землю оружия
# Задает время, через которое упавший на пол автомат, пистолет или дробовик автоматически удалится из игры.
# ДЛЯ ЗОМБИ: В оригинале стоит 300 секунд (5 минут). Это слишком долго! Изменяем строго на "15" или "20". На зомби-серверах после заражения людей пушки будут сыпаться десятками. Если они будут лежать по 5 минут, сервер на Linux и Windows просто захлебнется от лагов. 20 секунд — идеальное время, чтобы успеть подобрать оружие, но при этом очистить карту от мусора.
mp_item_staytime "20"

# mp_legacy_bombtarget_touch (0 / 1) - Физический радиус касания зоны закладки бомбы (плента)
# 0 = Новый строгий радиус (игрок должен стоять четко внутри зоны).
# 1 = Старый широкий радиус из старых версий CS 1.6 (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1". На зомби-картах бомбы все равно нет, так что этот параметр ни на что не влияет.
mp_legacy_bombtarget_touch "1"

# mp_respawn_immunitytime (число в секундах) - Системное бессмертие игрока после возрождения
# 0 = Полностью выключено. Игрок получает урон сразу, как только появился на спавне (стандарт).
# Число (например, 3) = Игрок полностью бессмертен первые 3 секунды после спавна.
# ДЛЯ ЗОМБИ: Оставляем строго "0". Любую защиту при спавне (если она тебе вообще нужна) лучше настраивать через встроенные конфиги самого зомби-мода. Если включить этот параметр здесь, то возродившийся зомби со встроенным бессмертием от ReGameDLL сможет добежать до людей в упор, а они не смогут откинуть его пулями.
mp_respawn_immunitytime "0"

# mp_respawn_immunity_effects (0 / 1) - Визуальные эффекты бессмертия при спавне
# 0 = Игрок выглядит как обычно.
# 1 = Игрок красиво светится красным или синим цветом (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1". Работает только в связке с параметром выше. Так как там стоит 0, эффекта не будет.
mp_respawn_immunity_effects "1"

# mp_respawn_immunity_force_unset (0 / 1 / 2) - Принудительное снятие бессмертия при действиях
# 0 = Бессмертие длится строго указанное время, что бы игрок ни делал.
# 1 = Бессмертие сразу пропадет, если игрок начал двигаться или атаковать (стандарт).
# 2 = Бессмертие пропадет только тогда, когда игрок нажмет левую кнопку мыши (атака).
# ДЛЯ ЗОМБИ: Оставляем "1".
mp_respawn_immunity_force_unset "1"

# mp_kill_filled_spawn (0 / 1) - Убивать ли игрока, если точка спавна уже занята чужим телом
# 0 = Выключено. Игроки могут появляться друг в друге без вреда для здоровья.
# 1 = Включено. Если на точке спавна кто-то стоит, то при попытке возродить туда второго игрока, первый будет автоматически убит сервером, чтобы избежать застревания моделей (стандарт).
# ДЛЯ ЗОМБИ: МЕНЯЕМ С "1" НА "0"! Это критически важно. Так как в самом начале мы настроили плагин прозрачности ReSemiClip, твои игроки и так могут спокойно проходить друг сквозь друга первые секунды раунда. Если оставить здесь "1", то на забитом зомби-спавне сервер начнет массово убивать твоих игроков прямо при появлении. Ставим строго "0".
mp_kill_filled_spawn "0"

# bot_deathmatch (0 / 1) - Режим Deathmatch для встроенных ботов
# 0 = Выключено. Боты играют по классическим правилам: пытаются заложить бомбу или спасти заложников.
# 1 = Включено. Режим «Мясорубка». Боты полностью игнорируют задачи карты и просто ищут фраги по всей локации.
# ДЛЯ ЗОМБИ: Оставляем "0".
bot_deathmatch "0"

# bot_quota_mode (normal / fill / match) - Режим заполнения сервера ботами
# normal = На сервере будет всегда находиться ровно столько ботов, сколько указано в команде bot_quota (стандарт).
# fill   = Сервер будет автоматически кикать ботов, когда заходят реальные люди, освобождая им слоты.
# match  = Сервер будет строго держать баланс (например, на 1 человека всегда добавлять 2 ботов).
# ДЛЯ ЗОМБИ: Оставляем стандартный "normal".
bot_quota_mode "normal"

# bot_join_delay (число секунд) - Задержка подключения ботов при смене карты
# Задает паузу в секундах, перед тем как боты начнут спавниться на сервере после загрузки новой карты.
# ДЛЯ ЗОМБИ: Оставляем "0" (заходить сразу без задержек).
bot_join_delay "0"

# bot_join_after_player (0 / 1 / 2) - Ожидание захода реального человека перед стартом ботов
# 0 = Выключено. Боты заходят на абсолютно пустой сервер сразу после смены карты и бегают там одни.
# 1 = Строгий режим (Strict). Боты будут сидеть в спектрах и зайдут в игру только тогда, когда первый реальный игрок зайдет за КТ или Т (стандарт).
# 2 = Мягкий режим (Soft). Боты зайдут в игру, как только человек просто подключится к серверу (даже если он сидит в зрителях).
# ДЛЯ ЗОМБИ: Оставляем стандартный "1", чтобы пустой сервер зря не гонял раунды.
bot_join_after_player "1"

# bot_freeze (0 / 1) - Полная заморозка встроенных ботов
# 0 = Выключено. Боты свободно двигаются, прыгают и стреляют (стандарт).
# 1 = Включено. Все боты мгновенно застывают на месте как вкопанные. Используется для тестов или тренировки стрельбы.
# ДЛЯ ЗОМБИ: Оставляем строго "0".
bot_freeze "0"

# mp_allow_point_servercommand (0 / 1) - Разрешить картам выполнять консольные команды сервера
# 0 = Запрещено (выключено). Сервер полностью игнорирует любые команды, зашитые авторами внутрь карты.
# 1 = Разрешено. Карта может сама через специальный объект (point_servercommand) отправлять команды в консоль сервера.
# ДЛЯ ЗОМБИ: Ставим строго "0"! Это критически важная защита от взлома. Некоторые скачанные из интернета кастомные зомби-карты (особенно старые или с «сюрпризами» от авторов) содержат внутри скрытые скрипты, которые при запуске карты могут принудительно выключить твой сервер, выдать кому-то админку или забанить тебя. Режим "0" намертво блокирует эту уязвимость.
mp_allow_point_servercommand "0"

# mp_scoreboard_showhealth ( от -1 до 5 ) - Отображение здоровья (HP) игроков в таблице счета
# -1 = Полностью отключить отображение колонки HP в табло.
#  0 = Не отправлять обновления здоровья клиентам (колонка будет пустой).
#  1 = Показывает здоровье только игроков команды Террористов (Зомби) вообще всем на сервере.
#  2 = Показывает здоровье только игроков команды Контр-Террористов (Людей) вообще всем на сервере.
#  3 = Показывает здоровье игроков только твоим союзникам по команде (стандарт игры).
#  4 = Показывает здоровье ВООБЩЕ ВСЕХ игроков (и врагов, и союзников) абсолютно всем на сервере.
#  5 = Показывает здоровье союзникам по команде и наблюдателям (спектакторам).
# ДЛЯ ЗОМБИ: Для зомби-сервера лучше поставить "4". Поскольку у зомби тысячи единиц здоровья, людям в процессе стрельбы очень интересно нажать Tab и посмотреть, сколько HP осталось у нападающих зомби (и наоборот — зомби видят остаток здоровья выживших). Это добавляет огромный азарт к игре.
mp_scoreboard_showhealth "4"

# mp_scoreboard_showmoney ( от -1 до 5 ) - Отображение денег игроков в таблице счета
# Значения (от -1 до 5) работают точно так же, как и для здоровья выше.
# ДЛЯ ЗОМБИ: Ставим строго "-1" (полностью отключить)! В зомби-модах классические доллары скрыты или вообще не используются, так как вся экономика завязана на аммо-паках (кредитах). Если оставить стандартное значение 3, то в таблице на Tab у всех игроков будут уныло отображаться нули ($0), что только портит вид сборки.
mp_scoreboard_showmoney "-1"

# mp_scoreboard_showdefkit (0 / 1) - Отображение иконки набора сапера (кусачек) у КТ в таблице счета
# 0 = Выключено (скрыть иконку кусачек в табло).
# 1 = Включено (показывать союзникам по КТ, у кого есть набор сапера) (стандарт).
# ДЛЯ ЗОМБИ: Ставим строго "0". Бомбы на zm_ картах нет, разминировать нечего, эта иконка в табло будет абсолютно лишней.
mp_scoreboard_showdefkit "0"

# ff_damage_reduction_bullets (число от 0 до 1) - Коэффициент урона по своим от пуль
# ДЛЯ ЗОМБИ: Оставляем стандартные "0.35". Так как огонь по своим на зомби-серверах всегда полностью отключен, движок даже не будет использовать эти формулы.
ff_damage_reduction_bullets "0.35"

# ff_damage_reduction_grenade (число от 0 до 1) - Коэффициент урона по своим от брошенной гранаты
# ДЛЯ ЗОМБИ: Оставляем стандартные "0.25".
ff_damage_reduction_grenade "0.25"

# ff_damage_reduction_grenade_self (число от 0 до 1) - Урон игрока самому себе от своей же гранаты
# 1.0 = Граната наносит игроку полный 100% урон, если он взорвет её под собой (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1.0" или ставь "0", если хочешь, чтобы люди не могли случайно нанести себе урон кастомными гранатами. Но стандарт "1.0" вполне нормален для баланса.
ff_damage_reduction_grenade_self "1.0"

# ff_damage_reduction_other (число от 0 до 1) - Коэффициент урона по своим от всего остального (нож, падение объектов)
# ДЛЯ ЗОМБИ: Оставляем стандартные "0.35".
ff_damage_reduction_other "0.35"

# mp_afk_bomb_drop_time (0 / число секунд) - Сброс бомбы от AFK-игрока на землю
# 0 = Выключено (бомба лежит у AFK-игрока до конца раунда).
# Более 5.0 = Время в секундах, через которое бомба сама выпадет из AFK-игрока на пол.
# ДЛЯ ЗОМБИ: Оставляем "0". На зомби-картах (zm_) бомбы нет, этот параметр не задействован.
mp_afk_bomb_drop_time "0"

# mp_radio_timeout (число секунд) - Задержка между радиосообщениями игрока
# 0 = Задержка полностью отключена (можно спамить радиокомандами без остановки).
# Число (например, 1.5) = Интервал в секундах, который нужно выждать перед отправкой следующей радиокоманды.
# ДЛЯ ЗОМБИ: Ставим "3.0" или оставляем "1.5". Это защищает уши игроков от спама радиокомандами ("Cover me!", "Go go go!") в узких нычках, где собирается много людей.
mp_radio_timeout "1.5"

# mp_radio_maxinround (число сообщений) - Максимальное количество радиосообщений от одного игрока за раунд
# 0 = Радиосообщения полностью отключены для всех.
# Число (например, 60) = Лимит радиокоманд на один раунд. После превышения лимита радио заблокируется до нового раунда.
# ДЛЯ ЗОМБИ: Оставляем "60" или снижаем до "15"-"20", чтобы полностью пресечь флуд звуками.
mp_radio_maxinround "60"

# mp_buy_anywhere (0 / 1 / 2 / 3) - Возможность открывать меню закупки в любом месте карты
# 0 = Выключено (закупка работает только в стандартной зоне байзоны на спавне) (стандарт).
# 1 = Обе команды могут покупать оружие в любой точке карты.
# 2 = Только команда Террористов (Зомби) может покупать везде.
# 3 = Только команда Контр-Террористов (Людей) может покупать везде.
# ДЛЯ ЗОМБИ: Оставляем строго "0". Кастомное меню магазина самого зомби-мода (на кнопку M) за аммо-паки и так работает по всей карте. Открывать везде классическую закупку CS 1.6 (B-8-2 и т.д.) не нужно, иначе люди смогут закупать обычные патроны в обход экономики мода.
mp_buy_anywhere "0"

# mp_unduck_method (0 / 1) - Метод расчета анимации приседания (Фикс Double Duck / Silent Run)
# 0 = Оригинальный баг CS 1.6. Позволяет игрокам бесшумно и быстро перемещаться, спамя кнопку приседания.
# 1 = Исправленный метод ReGameDLL. Плавная анимация подъема модели. Полностью убирает баг бесшумного бега.
# ДЛЯ ЗОМБИ: Ставим строго "1". Это делает игру честной: хитбоксы быстро приседающих зомби или людей не будут баговаться в воздухе, и по ним будет легко попадать пулями.
mp_unduck_method "1"

# mp_give_player_c4 (0 / 1) - Автоматическая выдача бомбы C4 случайному Террористу при спавне
# 0 = Выключено (бомба никому не выдается).
# 1 = Включено (один случайный игрок за Т всегда появляется с бомбой в руках) (стандарт).
# ДЛЯ ЗОМБИ: Ставим строго "0"! Нам на зомби-сервере бомба С4 вообще не нужна. Если её оставить, то в начале раунда у кого-то из Террористов в руках окажется бомба, а когда он превратится в зомби, она просто выпадет на пол лишним мусором.
mp_give_player_c4 "0"

# mp_weapons_allow_map_placed (0 / 1) - Разрешить спавн оружия, разложенного автором прямо на полу карты
# 0 = Скрыть всё лежащее на полу карты оружие.
# 1 = Разрешить (оружие будет лежать там, где его заложил создатель карты) (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1". На некоторых zm_ картах авторы специально раскладывают в нычках полезные пулеметы или гранаты. Пусть игроки их подбирают и используют.
mp_weapons_allow_map_placed "1"

# mp_fadetoblack (0 / 1 / 2) - Затемнение экрана (черный экран) после смерти игрока
# 0 = Выключено (после смерти игрок видит карту и может наблюдать за другими) (стандарт).
# 1 = Включено (после смерти экран становится полностью черным, наблюдать ни за кем нельзя).
# 2 = Экран темнеет на секунду только в момент самой смерти, а потом включается обычное наблюдение.
# ДЛЯ ЗОМБИ: Оставляем строго "0". Игроки после смерти или заражения должны свободно наблюдать за ходом мясного раунда.
mp_fadetoblack "0"

# mp_falldamage (0 / 1) - Получение урона при падении с большой высоты
# 0 = Выключено (можно прыгать с любых огромных крыш и не терять здоровье).
# 1 = Включено (при падении с высоты у игрока отнимаются единицы здоровья) (стандарт).
# ДЛЯ ЗОМБИ: Оставляем "1". Но если ты хочешь сделать сервер очень динамичным (как популярные CSO сборки), можно выставить "0". Тогда и зомби, и люди смогут летать по вертикали карт без страха разбиться. На классическом Zombie Plague обычно оставляют "1".
mp_falldamage "1"

# mp_t_default_grenades (строка с названиями гранат)
# Выдает бесплатные гранаты Террористам при спавне (hegrenade, flash, sgren).
# ДЛЯ ЗОМБИ: Оставляем пустым "".
mp_t_default_grenades ""

# mp_t_give_player_knife (0 / 1) - Выдача ножа Террористам при спавне
# 0 = Появляться с пустыми руками (без ножа).
# 1 = Выдавать стандартный нож при появлении (стандарт).
# ДЛЯ ЗОМБИ: Ставим строго "1". Нож жизненно необходим движку игры: именно на основе стандартного ножа плагин зомби-мода подменяет модель рук человека на когти зомби. Если выключить нож, зомби просто не смогут атаковать людей и заражать их.
mp_t_give_player_knife "1"

# mp_t_default_weapons_primary (строка с названием оружия)
# Выдает бесплатный автомат/винтовку Террористам сразу при появлении (например: "ak47").
# ДЛЯ ЗОМБИ: Оставляем строго пустым "". Нам не нужно оружие у Террористов на спавне.
mp_t_default_weapons_primary ""

# mp_t_default_weapons_secondary (строка с названием пистолета)
# Выдает бесплатный пистолет Террористам при спавне. По умолчанию игра дает "glock18".
# ДЛЯ ЗОМБИ: Полностью удаляем "glock18" и оставляем строчку пустой "". Если не очистить этот квар, то в первые 20 секунд раунда (до выбора Первого Инфицированного зомби) все игроки за Т появятся с пистолетами. В момент превращения в зомби этот Глок выпадет из рук игрока прямо на пол спавна, создавая кучу ненужного мусора на земле. Очищаем.
mp_t_default_weapons_secondary ""